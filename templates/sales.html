
{% extends "base.html" %}

{% block title %}Sales - PMS{% endblock %}

{% block content %}
<div class="app-layout">
    <nav class="sidebar">
        <div class="sidebar-logo">
            <i class="fas fa-clinic-medical"></i> PMS
        </div>
        
        <div class="nav-links">
            <a href="/dashboard" class="nav-link">
                <i class="fas fa-chart-line"></i> Dashboard
            </a>
            <a href="/inventory-page" class="nav-link">
                <i class="fas fa-boxes"></i> Inventory
            </a>
            <a href="/sales-page" class="nav-link active">
                <i class="fas fa-cash-register"></i> Sales
            </a>
            <a href="#" class="nav-link" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </div>
    </nav>

    <main class="main-content">
        <h2 style="margin-bottom: 2rem;">New Sale</h2>

        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 2rem;">
            <!-- Product Selection -->
            <div class="card">
                <div style="margin-bottom: 1rem;">
                    <input type="text" id="searchMedicine" placeholder="Search medicines..." onkeyup="filterMedicines()">
                </div>
                
                <div class="table-container" style="max-height: 400px; overflow-y: auto;">
                    <table id="medicineTable">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Stock</th>
                                <th>Price</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="medicineList">
                            <!-- Populated via JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Bill Summary -->
            <div class="card">
                <h4 style="margin-bottom: 1rem;">Bill Summary</h4>
                <div id="cartItems" style="margin-bottom: 1.5rem; min-height: 200px;">
                    <p style="color: var(--text-muted); text-align: center; margin-top: 2rem;">No items added</p>
                </div>
                
                <div style="border-top: 1px solid var(--border); padding-top: 1rem; margin-bottom: 1.5rem;">
                    <div class="flex justify-between items-center" style="font-size: 1.25rem; font-weight: 700;">
                        <span>Total</span>
                        <span id="grandTotal">$0.00</span>
                    </div>
                </div>
                
                <button class="btn btn-primary" style="width: 100%;" onclick="processSale()">Complete Sale</button>
            </div>
        </div>
    </main>
</div>

{% endblock %}

{% block scripts %}
<script>
    requireAuth();
    
    document.getElementById('logoutBtn').addEventListener('click', (e) => {
        e.preventDefault();
        Auth.logout();
    });

    let medicines = [];
    let cart = [];

    async function loadMedicines() {
        try {
            const response = await fetch(`${API_URL}/inventory`, { headers: Auth.getHeaders() });
            
            if (response.ok) {
                const data = await response.json();
                if (data.medicines) {
                    medicines = data.medicines;
                    renderMedicines(medicines);
                } else {
                    console.error('Invalid data format');
                    document.getElementById('medicineList').innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--danger);">Invalid data received.</td></tr>';
                }
            } else {
                console.error('Failed to load medicines:', response.status);
                document.getElementById('medicineList').innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--danger);">Failed to load medicines.</td></tr>';
            }
        } catch (error) {
            console.error('Error loading medicines', error);
            document.getElementById('medicineList').innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--danger);">Network error. Please try again.</td></tr>';
        }
    }

    function renderMedicines(list) {
        const tbody = document.getElementById('medicineList');
        tbody.innerHTML = '';
        list.forEach(med => {
            const tr = document.createElement('tr');
            
            // Name
            const tdName = document.createElement('td');
            tdName.textContent = med.name;
            tr.appendChild(tdName);
            
            // Stock
            const tdStock = document.createElement('td');
            tdStock.textContent = med.stock;
            if (med.stock === 0) {
                tdStock.classList.add('text-danger');
            }
            tr.appendChild(tdStock);
            
            // Price
            const tdPrice = document.createElement('td');
            tdPrice.textContent = `$${Number(med.price).toFixed(2)}`;
            tr.appendChild(tdPrice);
            
            // Action
            const tdAction = document.createElement('td');
            const btn = document.createElement('button');
            btn.className = 'btn btn-secondary';
            btn.style.padding = '0.25rem 0.5rem';
            
            const icon = document.createElement('i');
            icon.className = 'fas fa-plus';
            btn.appendChild(icon);
            
            if (med.stock === 0) {
                btn.disabled = true;
            } else {
                btn.onclick = function() {
                    if (typeof med.id === 'number') {
                        addToCart(med.id);
                    }
                };
            }
            tdAction.appendChild(btn);
            tr.appendChild(tdAction);
            
            tbody.appendChild(tr);
        });
    }

    function filterMedicines() {
        const query = document.getElementById('searchMedicine').value.toLowerCase();
        const filtered = medicines.filter(m => m.name.toLowerCase().includes(query));
        renderMedicines(filtered);
    }

    function addToCart(id) {
        const med = medicines.find(m => m.id === id);
        const existing = cart.find(item => item.id === id);
        
        if (existing) {
            if (existing.quantity < med.stock) {
                existing.quantity++;
            } else {
                alert('Not enough stock!');
            }
        } else {
            cart.push({ ...med, quantity: 1 });
        }
        renderCart();
    }

    function renderCart() {
        const container = document.getElementById('cartItems');
        container.innerHTML = ''; // Clear container safely
        
        if (cart.length === 0) {
            const emptyMsg = document.createElement('p');
            emptyMsg.style.color = 'var(--text-muted)';
            emptyMsg.style.textAlign = 'center';
            emptyMsg.style.marginTop = '2rem';
            emptyMsg.textContent = 'No items added';
            container.appendChild(emptyMsg);
            
            document.getElementById('grandTotal').textContent = '$0.00';
            return;
        }

        let total = 0;
        
        cart.forEach((item, index) => {
            const itemTotal = item.price * item.quantity;
            total += itemTotal;
            
            const row = document.createElement('div');
            row.className = 'flex justify-between items-center';
            row.style.marginBottom = '0.75rem';
            
            // Left side (Name + Price x Qty)
            const leftDiv = document.createElement('div');
            
            const nameDiv = document.createElement('div');
            nameDiv.style.fontWeight = '500';
            nameDiv.textContent = item.name;
            leftDiv.appendChild(nameDiv);
            
            const priceDiv = document.createElement('div');
            priceDiv.style.fontSize = '0.85rem';
            priceDiv.style.color = 'var(--text-muted)';
            priceDiv.textContent = `$${Number(item.price).toFixed(2)} x ${item.quantity}`;
            leftDiv.appendChild(priceDiv);
            
            row.appendChild(leftDiv);
            
            // Right side (Total + Delete)
            const rightDiv = document.createElement('div');
            
            const totalSpan = document.createElement('span');
            totalSpan.style.fontWeight = '600';
            totalSpan.textContent = `$${itemTotal.toFixed(2)}`;
            rightDiv.appendChild(totalSpan);
            
            const deleteIcon = document.createElement('i');
            deleteIcon.className = 'fas fa-times';
            deleteIcon.style.color = 'var(--danger)';
            deleteIcon.style.cursor = 'pointer';
            deleteIcon.style.marginLeft = '0.5rem';
            deleteIcon.onclick = function() {
                removeFromCart(index);
            };
            rightDiv.appendChild(deleteIcon);
            
            row.appendChild(rightDiv);
            container.appendChild(row);
        });
        
        document.getElementById('grandTotal').textContent = `$${total.toFixed(2)}`;
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        renderCart();
    }

    async function processSale() {
        if (cart.length === 0) return alert('Cart is empty');
        
        const saleData = {
            items: cart.map(item => ({ medicine_id: item.id, quantity: item.quantity }))
        };
        
        try {
            const response = await fetch(`${API_URL}/sales`, {
                method: 'POST',
                headers: Auth.getHeaders(),
                body: JSON.stringify(saleData)
            });
            
            const result = await response.json();
            
            if (response.ok) {
                alert(`Sale successful! Total: $${result.total}`);
                cart = [];
                renderCart();
                loadMedicines(); // Refresh stock
            } else {
                alert('Sale failed: ' + result.message);
            }
        } catch (error) {
            console.error('Error processing sale', error);
            alert('Error processing sale');
        }
    }

    loadMedicines();
</script>
{% endblock %}
